version: "3.9"

services:
  # PHP-FPM / App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book_review_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www/code:cached       # bind mount samo za kod, cached za brzinu
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    networks:
      - book_review

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: book_review_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/code:cached
      - ./docker/nginx:/etc/nginx/conf.d
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    networks:
      - book_review
    depends_on:
      - app

  # MySQL
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: book_review_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: book_review
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: book_review
      MYSQL_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - book_review

  # Redis
  redis:
    image: redis:alpine
    container_name: book_review_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - book_review

  # Queue
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book_review_queue
    command: php artisan queue:work
    volumes:
      - .:/var/www/code:cached
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    depends_on:
      - redis
      - mysql
    networks:
      - book_review

networks:
  book_review:

volumes:
  mysql_data:
  vendor_data:
  storage_data:
  cache_data: