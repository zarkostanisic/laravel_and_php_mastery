services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job_board_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www:cached
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    networks:
      - job_board

  nginx:
    image: nginx:alpine
    container_name: job_board_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:cached
      - ./docker/nginx:/etc/nginx/conf.d
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    depends_on:
      - app
    networks:
      - job_board

  mysql:
    image: mysql:8.0
    container_name: job_board_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: job_board
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: job_board
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - job_board
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
      timeout: 3s

  redis:
    image: redis:alpine
    container_name: job_board_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - job_board

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job_board_queue
    command: php artisan queue:work
    volumes:
      - .:/var/www:cached
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    depends_on:
      - app
      - mysql
      - redis
    networks:
      - job_board

networks:
  job_board:

volumes:
  mysql_data:
  vendor_data:
  storage_data:
  cache_data: